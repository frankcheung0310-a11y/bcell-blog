name: Build and Deploy to Master
on:
  push:
    branches: ["master"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      - name: Build with Jekyll
        run: |
          bundle exec jekyll build
          # 把生成的隐藏成品 _site 变成 CF 能看见的 dist
          cp -r _site dist
      - name: Force Push Dist to Master
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add -f dist/
          git commit -m "Deploy site to dist folder" || exit 0
          git push origin master
