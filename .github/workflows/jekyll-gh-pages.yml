name: Zero-Dependency-Build
on:
  push:
    branches: ["master"]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
      - name: Install and Build
        run: |
          gem install jekyll jekyll-theme-minimal
          jekyll build
          # 1. 彻底清空旧的 dist
          rm -rf dist
          mkdir dist
          # 2. 关键修正：将 _site 内部的所有文件（包含隐藏文件）拷贝到 dist 根目录
          # 注意 _site 后面的 /. 这是把内容铺平的关键
          cp -a _site/. dist/
          # 3. 预防万一：删掉 dist 里重复出现的 _site 文件夹（如果之前残留了）
          rm -rf dist/_site
      - name: Push to Repository
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add -f dist/
          git commit -m "Force deploy to dist" || exit 0
          git push origin master
