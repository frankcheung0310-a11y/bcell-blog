name: Weekly-Research-Hunter
on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install feedparser
      - run: python scripts/auto_research.py
      - run: |
          git config --global user.name "BCellBot"
          git config --global user.email "bot@bcellai.com"
          git add raw_papers/*.txt seen_papers.json
          git commit -m "Weekly report data: $(date +'%Y-%m-%d')" || exit 0
          git push origin master
