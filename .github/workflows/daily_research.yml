name: B-Cell Paper Crawler

on:
  schedule:
    - cron: '0 21 1,8,15,22 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run crawler
        run: python scripts/auto_research.py

      - name: Commit and Push
        run: |
          git config --global user.name "BCellAI-Bot"
          git config --global user.email "bot@bcellai.com"
          git add raw_papers/ seen_papers.json 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Raw papers: $(date +'%Y-%m-%d')"
            git push origin master
          else
            echo "没有新论文，跳过提交"
          fi
