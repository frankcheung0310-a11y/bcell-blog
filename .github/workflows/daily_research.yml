name: 7-Day B-Cell AI Research Update

on:
  schedule:
    # ✅ 修复一：每7天运行一次，UTC 21:00（东京时间早上6:00）
    - cron: '0 21 1,8,15,22 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser requests beautifulsoup4

      - name: Run research script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_research.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "BCellAI-Bot"
          git config --global user.email "bot@bcellai.com"

          # ✅ 修复二：同时提交posts和seen_papers.json
          git add _posts/ seen_papers.json 2>/dev/null || true

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: B-Cell Research $(date +'%Y-%m-%d')"
            git push origin master
          else
            echo "No changes detected, skipping commit."
          fi
