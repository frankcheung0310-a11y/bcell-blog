name: B-Cell Paper Crawler

on:
  schedule:
    - cron: '0 21 * * *' # 每天凌晨运行一次（UTC 21:00）
  workflow_dispatch:      # 允许你手动点击运行

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run crawler
        run: python scripts/auto_research.py

      - name: Commit and Push
        run: |
          git config --global user.name "BCellAI-Bot"
          git config --global user.email "bot@bcellai.com"
          # 关键：确保记录 raw_papers 文件夹和 seen_papers.json
          git add raw_papers/*.txt seen_papers.json 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "New Research Intelligence: $(date +'%Y-%m-%d')"
            git push origin master # 如果你的分支叫 master，请改成 master
          else
            echo "No changes to commit."
          fi
