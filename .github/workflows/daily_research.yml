name: 3-Day B-Cell AI Research Update

on:
  schedule:
    - cron: '0 21 */3 * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run research script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_research.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "BCellAI-Bot"
          git config --global user.email "bot@bcellai.com"
          
          # 创建一个空的记忆文件防止报错
          touch published_history.txt
          
          git add _posts/*.md published_history.txt
          
          # 简单的提交逻辑，不搞复杂的 if else
          git commit -m "Auto-update $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin master || echo "Nothing to push"
