name: Daily B-Cell AI Research Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取完整历史，防止 Push 失败

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run research script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_research.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "BCellAI-Bot"
          git config --global user.email "bot@bcellai.com"
          
          # 检查文件是否生成
          ls -R _posts/
          
          # 暴力添加所有变化
          git add _posts/*.md
          
          # 只要有变化就提交
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update: B-Cell Research $(date +'%Y-%m-%d')"
            git push origin master
          else
            echo "No changes detected to commit."
          fi
