name: 3-Day B-Cell AI Research Update

on:
  schedule:
    - cron: '0 21 */3 * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests beautifulsoup4

      - name: Run research script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_research.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "BCellAI-Bot"
          git config --global user.email "bot@bcellai.com"
          # 同时保存博文和历史记忆文件
          git add _posts/*.md published_history.txt || echo "No changes"
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-update $(date +'%Y-%m-%d')"
            git push origin master
          else
            echo "Nothing to commit"
          fi
            echo "No changes detected (neither posts nor history). Skipping commit."
          fi
