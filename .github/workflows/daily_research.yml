name: Daily B-Cell AI Research Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run research script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_research.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "BCellAI-Bot"
          git config --global user.email "bot@bcellai.com"
          # 关键修改：强制添加 _posts 目录下的所有 md 文件
          git add _posts/*.md
          # 检查是否有文件真的被添加了
          if git diff --cached --quiet; then
            echo "No changes detected in _posts directory."
          else
            git commit -m "Auto-update: B-Cell AI Research Report $(date +'%Y-%m-%d')"
            git push origin master
          fi
