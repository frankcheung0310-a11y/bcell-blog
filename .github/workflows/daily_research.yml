name: Daily B-Cell AI Research Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run research script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/auto_research.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "BCellAI-Bot"
          git config --global user.email "bot@bcellai.com"
          
          # 强制 Git 追踪 _posts 文件夹
          git add -f _posts/*.md
          
          # 检查状态并输出，方便查看
          git status
          
          # 只要有变化就提交
          if git diff --cached --quiet; then
            echo "No changes to commit (File might already exist with same content)"
          else
            git commit -m "Auto-update: B-Cell Research Roundup $(date +'%Y-%m-%d')"
            git push origin master
          fi
